# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Main"

on:
  push:
    tags: ["*"]
    branches: ["*"]
  pull_request:
    branches: ["*"]
  workflow_dispatch:

permissions: {}

jobs:
  gofmt:
    name: "Run gofmt"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
      - name: "Get Go version"
        id: "go-version"
        uses: "./.github/actions/go-version"
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c"
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          check-latest: true
      - name: "Run gofmt"
        run: |
          make gofmt

  gosec:
    name: "Run gosec"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      security-events: "write"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
      - name: "Get Go version"
        id: "go-version"
        uses: "./.github/actions/go-version"
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c"
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          check-latest: true
      - name: "Run gosec"
        run: |
          { make gosec GOSEC_ARGS="-fmt sarif -no-fail" ||:; } | tee ./gosec.sarif
          jq -e '[.runs[].results] | add | length == 0' ./gosec.sarif >/dev/null
      - name: "Upload SARIF"
        if: always()
        uses: "github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13"
        with:
          sarif_file: "./gosec.sarif"
          category: "gosec"

  govulncheck:
    name: "Run govulncheck"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      security-events: "write"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
      - name: "Get Go version"
        id: "go-version"
        uses: "./.github/actions/go-version"
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c"
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          check-latest: true
      - name: "Run govulncheck"
        run: |
          { make govulncheck GOVULNCHECK_ARGS="-format sarif" ||:; } | tee ./govulncheck.sarif
          jq -e '[.runs[].results] | add | length == 0' ./govulncheck.sarif >/dev/null
      - name: "Upload SARIF"
        if: always()
        uses: "github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13"
        with:
          sarif_file: "./govulncheck.sarif"
          category: "govulncheck"

  staticcheck:
    name: "Run staticcheck"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
      - name: "Get Go version"
        id: "go-version"
        uses: "./.github/actions/go-version"
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c"
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          check-latest: true
      - name: "Run staticcheck"
        run: |
          make staticcheck

  modernize:
    name: "Run modernize"
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
      - name: "Get Go version"
        id: "go-version"
        uses: "./.github/actions/go-version"
      - name: "Set up Go"
        uses: "actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417"
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          check-latest: true
      - name: "Run modernize"
        run: |
          make modernize

  test:
    name: "Test on ${{ matrix.os }}"
    needs: ["gofmt", "gosec", "govulncheck", "staticcheck", "modernize"]
    runs-on: "${{ matrix.os }}"
    permissions:
      contents: "read"
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
      - name: "Get Go version"
        id: "go-version"
        uses: "./.github/actions/go-version"
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c"
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          check-latest: true
      - name: "Install native dependencies (Linux)"
        if: "runner.os == 'Linux'"
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev
      - name: "Install native dependencies (Windows)"
        if: "runner.os == 'Windows'"
        shell: "pwsh"
        run: |
          C:\msys64\usr\bin\pacman.exe -S --noconfirm mingw-w64-x86_64-openssl
          $opensslPath = "C:\Program Files\OpenSSL-Win64"
          Remove-Item -Path $opensslPath -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Junction -Path $opensslPath -Target "C:\msys64\mingw64"
          echo "C:\msys64\mingw64\bin" >> $env:GITHUB_PATH
      - name: "Test"
        run: make test GO_TEST_ARGS="-race -timeout=240s"
        env:
          CGO_ENABLED: "1"

  build:
    name: >-
      Build for
      ${{ matrix.go.GOOS }}-${{ matrix.go.GOARCH }}
      ${{ matrix.go.GOARM != '' && format('v{0}', matrix.go.GOARM) || '' }}
    needs: ["test"]
    runs-on: "ubuntu-latest"
    permissions:
      attestations: "write"
      contents: "read"
      id-token: "write"
    strategy:
      fail-fast: false
      matrix:
        go:
          - { GOOS: "linux", GOARCH: "amd64" }
          - { GOOS: "linux", GOARCH: "arm64" }
          - { GOOS: "linux", GOARCH: "arm", GOARM: "7" }
          - { GOOS: "linux", GOARCH: "arm", GOARM: "6" }
          - { GOOS: "linux", GOARCH: "riscv64" }
          - { GOOS: "linux", GOARCH: "ppc64le" }
          - { GOOS: "linux", GOARCH: "s390x" }
          - { GOOS: "linux", GOARCH: "loong64" }
          - { GOOS: "windows", GOARCH: "amd64" }
          - { GOOS: "windows", GOARCH: "arm64" }
          - { GOOS: "darwin", GOARCH: "amd64" }
          - { GOOS: "darwin", GOARCH: "arm64" }
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
        with:
          filter: "blob:none"
          fetch-depth: 0
      - name: "Set SOURCE_DATE_EPOCH"
        run: printf 'SOURCE_DATE_EPOCH=%s\n' "$(git log -1 --format=%ct)" >> "${GITHUB_ENV:?}"
      - name: "Get Go version"
        id: "go-version"
        uses: "./.github/actions/go-version"
      - name: "Set up Go"
        uses: "actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c"
        with:
          go-version: "${{ steps.go-version.outputs.version }}"
          check-latest: true
      - name: "Build"
        run: |
          make build \
            GOOS="${{ matrix.go.GOOS }}" \
            GOARCH="${{ matrix.go.GOARCH }}" \
            GOARM="${{ matrix.go.GOARM }}"
          file ./dist/* && gzip -nv ./dist/*
      - name: "Generate artifact attestation"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32"
        with:
          subject-path: "./dist/*.gz"
      - name: "Upload artifact"
        uses: "actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f"
        with:
          name: "dist-${{ matrix.go.GOOS }}-${{ matrix.go.GOARCH }}-${{ matrix.go.GOARM }}"
          path: "./dist/*.gz"
          retention-days: 1

  build-push-docker:
    name: "Build and push Docker images"
    needs: ["build"]
    runs-on: "ubuntu-latest"
    permissions:
      artifact-metadata: "write"
      attestations: "write"
      contents: "read"
      id-token: "write"
      packages: "write"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"
        with:
          filter: "blob:none"
          fetch-depth: 0
      - name: "Set SOURCE_DATE_EPOCH"
        run: printf 'SOURCE_DATE_EPOCH=%s\n' "$(git log -1 --format=%ct)" >> "${GITHUB_ENV:?}"
      - name: "Set up Docker Buildx"
        uses: "hectorm/ghaction-docker-buildx-setup@fec3efdbb455c2aa58a4fbfd11a9853f5de2cdba"
      - name: "Login to GitHub Container Registry"
        if: "github.event_name != 'pull_request'"
        uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121"
        with:
          registry: "ghcr.io"
          username: "${{ github.actor }}"
          password: "${{ secrets.GITHUB_TOKEN }}"
      - name: "Login to Docker Hub"
        if: "github.event_name != 'pull_request'"
        uses: "docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121"
        with:
          registry: "docker.io"
          username: "${{ secrets.DOCKERHUB_USERNAME }}"
          password: "${{ secrets.DOCKERHUB_TOKEN }}"
      - name: "Extract metadata"
        id: "meta"
        uses: "docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf"
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
          labels: |
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]' tz='UTC'}}
      - name: "Build and push"
        id: "build-push"
        uses: "hectorm/ghaction-docker-buildx-build@cc28557c639a7ccb0dbe0d57a8afd6c381eb38f9"
        with:
          context: "./"
          platforms: |
            linux/amd64
            linux/arm64/v8
            linux/arm/v7
            linux/arm/v6
            linux/riscv64
            linux/ppc64le
            linux/s390x
            linux/loong64
          tags: "${{ steps.meta.outputs.tags }}"
          labels: "${{ steps.meta.outputs.labels }}"
          extra-args: |
            --build-arg=SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
            --output=type=image,push=${{ github.event_name != 'pull_request' }},rewrite-timestamp=true
            --provenance=mode=max,reproducible=true
            --sbom=true
      - name: "Generate artifact attestation (GHCR)"
        if: "github.event_name != 'pull_request'"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32"
        with:
          subject-name: "ghcr.io/${{ github.repository }}"
          subject-digest: "${{ steps.build-push.outputs.digest }}"
          push-to-registry: "${{ github.event_name != 'pull_request' }}"
      - name: "Generate artifact attestation (Docker Hub)"
        if: "github.event_name != 'pull_request'"
        uses: "actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32"
        with:
          subject-name: "index.docker.io/${{ github.repository }}"
          subject-digest: "${{ steps.build-push.outputs.digest }}"
          push-to-registry: "${{ github.event_name != 'pull_request' }}"

  publish-github-release:
    name: "Publish GitHub release"
    if: "startsWith(github.ref, 'refs/tags/v')"
    needs: ["build", "build-push-docker"]
    runs-on: "ubuntu-latest"
    permissions:
      contents: "write"
    steps:
      - name: "Download artifacts"
        uses: "actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c"
        with:
          pattern: "dist-*"
          merge-multiple: true
          path: "assets"
      - name: "Publish"
        uses: "hectorm/ghaction-release@d0426a7a369ce2c1ed615e1a583788b22745ccfe"
        with:
          assets-path: "./assets/"
